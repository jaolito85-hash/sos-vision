server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Sala de Comando (SPA React) — servida em /sala.
    location /sala/ {
        try_files $uri $uri/ /sala/index.html;
    }
    # PWA da vítima (token-link de rastreamento).
    location /vitima/ {
        try_files $uri $uri/ /vitima/index.html;
    }
    # PWA de campo (equipe de resgate).
    location /campo/ {
        try_files $uri $uri/ /campo/index.html;
    }
    # Landing institucional (porta de entrada) em /.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Service Workers não devem ser cacheados agressivamente.
    location ~* sw\.js$ {
        add_header Cache-Control "no-cache";
    }
}
