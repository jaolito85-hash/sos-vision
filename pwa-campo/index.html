<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <meta name="theme-color" content="#1e3a8a" />
  <link rel="manifest" href="manifest.webmanifest" />
  <link href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" rel="stylesheet" />
  <title>SOS Campo — Equipe de Resgate</title>
  <style>
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body { margin: 0; font-family: system-ui, -apple-system, "Segoe UI", sans-serif; background: #0b1220; color: #fff; padding-bottom: 24px; }
    header { background: #1e3a8a; padding: 18px 18px 14px; position: sticky; top: 0; z-index: 5; box-shadow: 0 4px 12px rgba(0,0,0,.4); }
    header b { font-size: clamp(22px, 6vw, 30px); display: block; line-height: 1.1; }
    header small { display: block; color: #bfdbfe; font-size: clamp(15px, 4vw, 18px); margin-top: 4px; }
    .pos { font-size: clamp(13px, 3.6vw, 16px); color: #93c5fd; padding: 8px 18px 0; }
    .list { padding: 16px; max-width: 640px; margin: 0 auto; }
    .card {
      background: #1e293b; border-radius: 20px; padding: 18px; margin-bottom: 18px;
      border-left: 10px solid #ef4444; box-shadow: 0 6px 18px rgba(0,0,0,.35);
    }
    .card h2 { margin: 0 0 8px; font-size: clamp(22px, 6vw, 30px); line-height: 1.1; }
    .meta { color: #cbd5e1; font-size: clamp(16px, 4.4vw, 21px); margin-bottom: 8px; }
    .tag { display: inline-block; background: #334155; border-radius: 10px; padding: 6px 12px; font-size: clamp(15px, 4vw, 19px); margin: 0 6px 6px 0; font-weight: 700; }
    .water { color: #fca5a5; font-weight: 900; }
    .btns { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 14px; }
    button, .nav {
      border: 0; border-radius: 16px; padding: 22px 12px; font-size: clamp(18px, 5vw, 24px);
      font-weight: 900; color: #fff; text-align: center; text-decoration: none; display: block; line-height: 1.15;
    }
    .nav { background: #0ea5e9; grid-column: 1 / -1; }
    .b1 { background: #f59e0b; } .b2 { background: #eab308; color: #000; } .b3 { background: #16a34a; grid-column: 1 / -1; }
    .empty { padding: 60px 18px; text-align: center; color: #64748b; font-size: clamp(18px, 5vw, 22px); }
    .b-rota { background: #0369a1; grid-column: 1 / -1; }
    .reportar-via {
      display: block; width: calc(100% - 36px); margin: 4px 18px 0; background: #b45309;
      color: #fff; border: 0; border-radius: 14px; padding: 14px; font-weight: 800;
      font-size: clamp(15px, 4vw, 18px);
    }
    /* Overlay do mini-mapa de rota */
    #mapaWrap { display: none; position: fixed; inset: 0; z-index: 50; background: #0b1220; }
    #mapa { position: absolute; inset: 0; }
    #mapaTop { position: absolute; top: 0; left: 0; right: 0; z-index: 2; display: flex; gap: 10px; padding: 12px; }
    #mapaTop button, #mapaTop a {
      flex: 1; border: 0; border-radius: 14px; padding: 16px 12px; font-size: clamp(16px, 4.5vw, 20px);
      font-weight: 900; color: #fff; text-align: center; text-decoration: none;
    }
    #fecharMapa { background: #334155; } #navMapa { background: #0ea5e9; }
    #rotaInfo {
      position: absolute; bottom: 16px; left: 12px; right: 12px; z-index: 2; text-align: center;
      background: rgba(2,6,23,.85); color: #e2e8f0; border: 1px solid #1e3a8a; border-radius: 14px;
      padding: 12px; font-size: clamp(16px, 4.5vw, 20px); font-weight: 700;
    }
  </style>
</head>
<body>
  <header><b id="equipe">SOS Campo</b><small id="sub">carregando equipe…</small></header>
  <div class="pos" id="pos"></div>
  <button id="reportarVia" class="reportar-via" type="button">🚧 Reportar via bloqueada aqui</button>
  <div class="list" id="list"><div class="empty">Carregando chamados…</div></div>

  <div id="mapaWrap">
    <div id="mapa"></div>
    <div id="mapaTop">
      <button id="fecharMapa" type="button">✕ Fechar</button>
      <a id="navMapa" target="_blank" rel="noreferrer">🧭 Navegar</a>
    </div>
    <div id="rotaInfo"></div>
  </div>

  <script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
  <script src="app.js"></script>
</body>
</html>
